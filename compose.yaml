services:
  nim:
    image: nvcr.io/nvidia/nim:latest
    container_name: nim
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NIM_API_KEY=${NIM_API_KEY}
      - WORKBENCH_API_KEY=${WORKBENCH_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    ports:
      - "5000:5000"
    volumes:
      - nim_data:/workspace/data
    profiles:
      - nim
    restart: unless-stopped

  vector-db:
    image: milvusdb/milvus:v2.3.0
    container_name: milvus
    environment:
      - TZ=UTC
    ports:
      - "19530:19530"  # gRPC
      - "19121:19121"  # HTTP
    volumes:
      - milvus_data:/var/lib/milvus
    profiles:
      - db
    restart: unless-stopped

  frontend:
    image: nvcr.io/nvidia/workbench/frontend:latest
    container_name: workbench-frontend
    environment:
      - WORKBENCH_API_KEY=${WORKBENCH_API_KEY:-}
    ports:
      - "8080:8080"
    depends_on:
      - nim
    profiles:
      - frontend
    restart: unless-stopped

volumes:
  nim_data:
  milvus_data:
